name = 'erika-florist-api'
main = "build/index.js"
compatibility_date = "2025-02-16"

[vars]
ALLOWED_ORIGINS = "erika.florist"

[env.dev.vars]
ALLOWED_ORIGINS = "localhost,127.0.0.1"

routes = [{ pattern = "api.erika.florist/*", zone_name = "erika.florist" }]

[build]
command = "cargo install -q worker-build@^0.7 && worker-build --release"

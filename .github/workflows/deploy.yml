name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**/*"
      - ".github/workflows/deploy.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    if: "!contains(github.event.head_commit.message, '[skip cd]')"
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      website: ${{ steps.filter.outputs.website }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "Cargo.toml"
              - "Cargo.lock"
              - "rust-toolchain.toml"
              - "crates/backend/**/*"
            website:
              - "Cargo.toml"
              - "Cargo.lock"
              - "rust-toolchain.toml"
              - "crates/website/**/*"

  deploy:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Maudit's placeholder cache is validated by mtime+size; checkout resets
      # mtimes, so restore them from git history to get cache hits across runs.
      - name: Restore file mtimes
        uses: chetan/git-restore-mtime-action@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Processed images + image_cache.bin. Kept out of the cargo cache so a
      # Cargo.lock change doesn't throw away already-processed images.
      - name: Cache Maudit images
        uses: actions/cache@v4
        with:
          path: target/maudit
          key: maudit-${{ runner.os }}-${{ hashFiles('crates/website/content/**/*.png', 'crates/website/content/**/*.jpg', 'crates/website/content/**/*.jpeg', 'crates/website/content/**/*.webp', 'crates/website/static/**') }}
          restore-keys: |
            maudit-${{ runner.os }}-

      - name: Build
        if: needs.changes.outputs.website == 'true'
        run: cargo build --release --package erikaflorist

      - name: Deploy Website
        if: needs.changes.outputs.website == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: ./crates/website
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Backend
        if: needs.changes.outputs.backend == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: ./crates/backend
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
